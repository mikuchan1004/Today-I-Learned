<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login_box {
            /* border: 1px solid red; */
            width: 500px;
            display: flex;
            flex-direction: column;
            align-items : center;
            justify-content: center;
            background-color: rgb(44, 62, 80);
            color: #ffffff;

        }
        h3 {
            text-align:center;
            
        }

        button h3 {
            line-height: 0;
        }
        
        button {
            cursor: pointer;
        }

        .email , .password {
            box-sizing: border-box;
            width: 450px;
            height: 35px;
            padding: 10px;
            margin: 10px;
            border: 1px solid #ddd;
            outline: none;
        }

        .log-in {
            box-sizing: border-box;
            width: 450px;
            height: 35px;
            margin: 10px;
            background-color: rgb(54, 199, 54);
        }

    </style>
</head>
<body>
     <div class="login_box">
        <h3>Welcome Back!</h3>
        <input class="email" type="email" placeholder="Email">
        <input class="password" type="password" placeholder="Password">
        <form action="main.html" method="get">
            <button type="submit" class="log-in"><h3>LOGIN</h3></button>
        </form>
     </div>
</body>
</html>
