<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

       .login_box {
            width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            background-color: rgb(44, 62, 80);
            color: #ffffff;
            padding: 20px 0;
            box-sizing: border-box;
        }

        
        p {
            text-align: center;
            margin : 0; 
            font-size: 27px;
            letter-spacing: -1px; 
        }

        input {
            width: 450px;
            height: 35px;
            padding: 10px;
            margin: 15px 0; 
            box-sizing: border-box;
            border: 1px solid #ddd;
            outline: none;
            background-color:transparent
        }

      .log-in {
            width: 450px;
            height: 50px;
            margin: 10px 0; 
            background-color: rgb(28, 184, 124);
            border: none;
            cursor: pointer;
            color:white;
        }

        .log-in h3 {
            margin: 0;
            padding: 0;
            font-size: 23px;
        }

    </style>
</head>
<body>
     <div class="login_box">
        <p>Welcome Back!</p>
        <input class="email" type="email" placeholder="Email Address *">
        <input class="password" type="password" placeholder="Password *">
        <form action="main.html" method="get">
            <button type="submit" class="log-in"><h3>LOG IN</h3></button>
        </form>
     </div>
</body>
</html>
