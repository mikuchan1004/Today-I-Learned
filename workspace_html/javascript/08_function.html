        function plus2(x, y) {
            console.log(`x : ${x} , y : ${y}`)

        // 전달받은 값이 있으면 사용하고 없으면 기본값 사용 
        function plus3(x, y=0) {
            console.log(`x : ${x} , y : ${y}`)
            if( y == undefined) {
                console.log('y값 입력못받음')

            }

            const  z = x + y
