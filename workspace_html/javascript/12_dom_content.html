                const msg =  document.getElementById('msg')

                // 태그 안쪽의 글씨들 (컨텐츠) 가져오는 방법들

                // 컨텐츠 영역의 소스 중에서 text(글씨)만 "그대로" 가져온다
                // 띄어쓰기나 엔터 등이 살아있다.
                // 값을 넣는 경우 tag는 글씨로 인식된다
                console.log('msg.textContent' , msg.textContent)

                // innerText
                // 브라우저에 보이는 글씨로 가져온다
                //  - 브라우저가 보여줄 내용에 대한 계산이 끝나고 실제로 표시하는 text
                console.log('msg.innerText' , msg.innerText)

                // innerHTML
                // 컨텐츠 영역의 소스를 그대로 가져온다.
                console.log('msg.innerHTML' , msg.innerHTML)

                // 위의 것은 변수의 내용을 읽은거고 
                // 이제부터 변수에 값을 담으면 
                // 컨텐츠의 내용을 바꿔준다.

                // textContent, innerText는 tag도 글씨로 인식한다.
                // msg.textContent = '<h1>h1제목</h1>  a   b        c'
                // msg.innerText= '<h1>h1제목</h1>  a   b        c'
                
                // innerHTML은 tag는 tag로 인식한다
                msg.innerHTML= '<h1>h1제목</h1>  a   b        c'

                setInterval(function(){

                    clock.textContent = time

                log.append(div)

                // 같은 객체는 이동된다.
                log.append(div)

                const p = document.createElement('p')
                p.textContent = 'p태그'

                // appendChild

                //  DOM만 넣을 수 있다
                log.appendChild(p)

                const p2 = document.createElement('p')
                p2.textContent = 'p2'

                // prepend :  첫번째 자식 요소로 추가
