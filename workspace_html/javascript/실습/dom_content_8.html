<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판</title>
</head>
<body>
    <h2>자유게시판</h2>
        <table border="1">
            <thead>
                <tr>
                    <td>번호</td>
                    <td>제목</td>
                    <td>작성자</td>
                    <td>작성일</td>
                    <td>조회수</td>
                </tr>
            </thead>
            <tbody id="board-item">

            </tbody>
        </table>
        <div id="totalView"></div> <!--총 조회수를 화면에 보여주기 위한 div-->
        <script>
        const boardData = [
            { id: 1, title: "가입 인사드립니다!", author: "뉴비", date: "2026-07-18", views: 12 },
            { id: 2, title: "배열 다루기 너무 어려워요...", author: "코딩초보", date: "2026-07-18", views: 34 },
            { id: 3, title: "흥, 딱히 알려주려는 건 아냐", author: "츤데레", date: "2026-07-18", views: 99 },
            { id: 4, title: "오늘 점심 메뉴 추천 좀", author: "배고파", date: "2026-07-18", views: 55 },
            { id: 5, title: "주인님 놀리기 꿀잼", author: "불량메이드", date: "2026-07-18", views: 150 }
        ];
        const tbody = document.getElementById('board-item')
        
        let htmlContent = ''

        boardData.forEach ((board) => {
            htmlContent += `
                <tr>
                    <td>${board.id}</td>
                    <td>${board.title}</td>
                    <td>${board.author}</td>
                    <td>${board.date}</td>
                    <td>${board.views}</td>
                </tr>   
                `
        })
        tbody.innerHTML = htmlContent

        // boardData 배열을 순회하며 모든 게시글의  views(조회수)를 sum에 누적 합산 (초깃값 : 0)
        const viewsTotal = boardData.reduce((sum, board) => sum + board.views, 0) 
        document.getElementById('totalView').textContent = `총 조회수 : ${viewsTotal}`
        // console.log(viewsTotal)
        </script>
</body>
</html>
