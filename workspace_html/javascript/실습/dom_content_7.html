<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 게시판</title>
</head>
<body>
    <h2>게시판</h2>
        <table border="1">
            <thead>
                <tr>
                    <th>번호</th>
                    <th>제목</th>
                    <th>작성자</th>
                    <th>작성일</th>
                    <th>조회수</th>
                </tr>
            </thead>
            <tbody id="board-list">

            </tbody>
        </table>
        <script>
            const boardData = [
            { id: 1, title: "가입 인사드립니다!", author: "뉴비", date: "2026-07-18", views: 12 },
            { id: 2, title: "배열 다루기 너무 어려워요...", author: "코딩초보", date: "2026-07-18", views: 34 },
            { id: 3, title: "흥, 딱히 알려주려는 건 아냐", author: "츤데레", date: "2026-07-18", views: 99 },
            { id: 4, title: "오늘 점심 메뉴 추천 좀", author: "배고파", date: "2026-07-18", views: 55 },
            { id: 5, title: "주인님 놀리기 꿀잼", author: "불량메이드", date: "2026-07-18", views: 150 }
            ];

            const tbody = document.querySelector('#board-list')

            // 필터링 -> 정렬 -> HTML 문자열 변환 -> 하나로 합치기 -> DOM 삽입 
            tbody.innerHTML = boardData
            .filter(board => board.views >= 50) // 50 이상 필터링
            .sort((a,b) => b.views -  a.views) // 내림차순 정렬 
            // 데이터를 HTML 문자열(배열)로 변환 
            .map(board => ` 
                <tr>
                    <td>${board.id}</td>
                    <td>${board.title}</td>
                    <td>${board.author}</td>
                    <td>${board.date}</td>
                    <td>${board.views}</td>
                </tr>
            `)
            .join ('') // 배열로 쪼개진 문자열들을 쉼표 없이 하나의 긴 문자열로 합침!

</body>
