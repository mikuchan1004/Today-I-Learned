<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새로운 게시글 등록하기</title>
</head>
<body>
    <table border="1">
        <thead>
            <tr>
                <th>번호</th>
                <th>제목</th>
                <th>작성자</th>
                <th>작성일</th>
                <th>조회수</th>
            </tr>
        </thead>
    <tbody id="board-item">

    </tbody>

    </table>

    <script>

    let boardData = [
        { id: 1, title: "가입 인사드립니다!", author: "뉴비", date: "2026-07-18", views: 12 },
        { id: 2, title: "배열 다루기 너무 어려워요...", author: "코딩초보", date: "2026-07-18", views: 34 }
    ];
    // 새로 추가할 게시글 데이터
    const newPost = { id: 3, title: "배열에 글 추가하는 법 질문요", author: "열공중", date: "2026-07-19", views: 0 };

    boardData = [...boardData, newPost] // 기존 배열에 새로운 배열을 추가! const를 쓰면 에러나니까 주의
    
    const tbody = document.querySelector('#board-item')
    let htmlContent = ''
    boardData.forEach ((board) => {
        htmlContent += `
        <tr>
            <td>${board.id}</td>
            <td>${board.title}</td>
            <td>${board.author}</td>
            <td>${board.date}</td>
            <td>${board.views}</td>
        </tr>
        `
    })
    tbody.innerHTML = htmlContent
    </script>
</body>
</html>
