<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dom_content</title>
</head>
<body>
        <table border='1'>
            <thead>
                    <th>상품명</th>
                    <th>가격</th>
                    <th>재고</th>
            </thead>
            <tbody id="product">

            </tbody>
        </table>

        <script>
            const rows = [
                ['마우스' , '15000' , '5개'],
                ['키보드' , '13000' , '10개'],
                ['스피커' , '15000' , '15개'],
                ['헤드셋', '14000' , '7개' ],
                ['HDD' , '20000' , '10개']
            ]
            // // ID가 product인 tbody 가져오기
            // const tbody = document.getElementById('product')

            // // 테이블 첫번째 줄 
            // const tr = document.createElement('tr')
            // tbody.append(tr)

            // const td = document.createElement('td')
            // td.textContent = rows[0][0]
            // tr.append(td)

            // const td2 = document.createElement('td')
            // td2.textContent = rows[0][1]
            // tr.append(td2)

            // const td3 = document.createElement('td')
            // td3.textContent = rows[0][2]
            // tr.append(td3)
            // console.log(td3)

            // // 테이블 두번째 줄 
            // const tr2 = document.createElement('tr')
            // tbody.append(tr2)

            // const td4 = document.createElement('td')
            // td4.textContent = rows[1][0]
            // tr2.append(td4)

            // const td5 = document.createElement('td')
            // td5.textContent = rows[1][1]
            // tr2.append(td5)

            // const td6 = document.createElement('td')
            // td6.textContent = rows[1][2]
            // tr2.append(td6)

            // for으로 반복!
            const tbody = document.getElementById('product')

            for(let i=0; i < rows.length; i++) {
                // 줄을 만들고 tbody에 올린다
                const tr = document.createElement('tr')
                tbody.append(tr)

                // 첫 번째 칸을 만들어 상품명을 넣고 tr에 붙인다.
                const td = document.createElement('td')
                td.textContent = rows[i][0]
                tr.append(td)

                // 두 번째 칸을 만들어 가격을 넣고 tr에 붙인다.
                const td2 = document.createElement('td')
                td2.textContent = rows[i][1]
                tr.append(td2)

                // 세 번째 칸을 만들어 재고를 넣고 tr에 붙인다.
                const td3 = document.createElement('td')
                td3.textContent = rows[i][2]
                tr.append(td3)

            }

        
            

        </script>
</body>
</html>
