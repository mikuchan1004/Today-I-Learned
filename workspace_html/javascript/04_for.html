<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for</title>
</head>
<body>
    <script>
        /*
            for( 초기화식; 조건식; 증감식 ) 

            1. 초기화 식 실행  (맨 처음에 딱 한번만 실행, 생략 가능)
            2. 조건식이 거짓이 아니면 (생략 가능)
            3. 실행 블럭을 실행한다. 
            4. 증감식이 실행된다. (생략 가능)
            5. '2.' 번의 조건식으로 가서 false일 때 까지 반복. 

        */
       for (let i = 1 ; i<=10; i++) {
            console.log(i)
       }

       // 1 ~ 5까지의 합 구하기

       let a = 1;
       let sum = 0;
       sum = sum + 1
       sum += 2
       sum += 3
       sum = sum + 4
       sum = sum + 5
       console.log(sum)

       sum = 0;
       for(let i=1; i <=5; i++) {
            sum = sum + i
       }
       console.log(sum)

       // 문제1. 5~1까지 출력 
       for (let b = 5; b>=1; b--) {
        console.log(b)
       }

       // 문제2. 1~5까지 출력하면서 홀 짝 표시 
       
       for (let c = 1; c<=5; c++) {
            if(c % 2 != 0) {
                console.log (` ${c} (홀)`)
            } else {
                console.log(` ${c} (짝) `)
            }
       }

       // 문제3. 1~10까지 홀수의 수를 세기.
       // 1~10까지 반복
       // 홀수 판단
       // 그떄마다 카운트
       // 카운트? 변수에 몇개였는지 저장
       let count = 0;
       for (i = 1; i <= 10; i++) {
            if (i % 2 == 1) {
                count++
            }
       }
       console.log('count : ' , count)

       /*
            반복문 만드는 원리

            1. 반복 되는 것 찾기 
                - ctrl c , v 했을 때 바뀌지 않는 것 찾기 
            
            2. 반복 되지 않는 것의 규칙 찾기

            3. 규칙을 변수로 바꿔서 ctrl c, v 해도 되게 바꾸기

            4. 시작 값 파악

            5. 종료 조건 파악
       */


       // 구구단 
       // 2 x 1 = 2 
       // 2 x 2 = 4
       console.log(' 2 x 1 = 2')
       console.log(' 2 x 2 = 4')
       let c = 1;
       console.log(` 2 x ${c} = ${c*2}`)
       c = 2
       console.log(` 2 x ${c} = ${c*2}`)
       
       console.log('-----------------------------')
       for (let i = 1; i<=9; i++) {
        console.log(` 2 x ${i} = ${i*2}`)
       }
       console.log('-----------------------------')
        for (let i = 1; i<=9; i++) {
        console.log(` 3 x ${i} = ${i*3}`)
        }

        let d = 2
        for (let i = 1; i<=9; i++) {
        console.log(` ${d} x ${i} = ${i*d}`)
        } 
        
        console.log('-----------------------------')
        for (let j=2; j<=9; j++) {
            for (let i = 1; i<=9; i++) {
            console.log(` ${j} x ${i} = ${i*j}`)
            } 
        }
        

        // 문제3 
        // 주사위 하나의 모든 경우의 수를 출력하시오.

        for (let i = 1; i<=6; i++) {
            console.log(`주사위 눈 : ${i}`);
        }

        // 문제4
        // 주사위 두개의 모든 경우의 수를 출력하시오.
        // 예 : [1,2] [2,1]

        for (let i = 1; i<=6; i++) {
            for (let j = 1; j<=6; j++) {
                console.log(` ${i} , ${j} `);
            }
        }

        // 문제5 
        // 주사위 두개로 나올 수 있는 합 별 조합 
        // 예 : 
        /*
            합 2 : [1, 1]
            합 3 : [1, 2] [2, 1]
            합 4 : [1, 3] [2, 2] [3, 1]
        */  
        
        for (let k = 2; k <= 12; k++) {
            console.log(' =-=-= 합이 '+k+' 인 것 =-=-= ')
            // 주사위 두개 도는 곳
            for(let i = 1; i <= 6; i++) {
                for (let j = 1; j <= 6; j++) {
                    // 합이 k인 것만 출력
                    if (i + j == k) {
                        console.log( '[' + i + ',' + j + ']' ) 
                    }
                }
            }
            console.log()
        } 
        
        // 로또 번호 추출 
        for (let i = 1; i <=6; i++) {
            // 1 ~ 45의 숫자 랜덤으로 뽑기
         let rand = parseInt (Math.random() * 45) + 1
        console.log(rand)
        }
       
        
        for(let i = 1; i <= 100; i++) {
            if(i == 11) {
                console.log(i , '종료합니다');
                break;
            }   
            console.log(i);
        }  

    
    </script>
</body>
</html>
