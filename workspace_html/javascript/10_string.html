<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>string</title>
    <script>

        const str = '기사도가 죽었을 리가'

        // 문자열의 길이 
        console.log('str.length : ' ,  + str.length)

        // indexOf 
        // 동일한 글씨 찾기 
        // 있으면 동일한 첫번째 글씨 index 반환
        // 없으면 -1 반환
        console.log('죽었 ' , str.indexOf('죽었'))
        console.log('가' , str.indexOf('가'))
        console.log('나' , str.indexOf('나'))

        // replace
        // 첫번째 전달인자를 두번째 전달인자로 바꾼다.
        // 단, 처음 만나는 것만 바꾼다.
        let s1 = str.replace('죽었' , '살았')
        console.log(str)
        console.log(s1)

        let s2 = str.replace('가' , '나')
        console.log(s2)

        // 정규 표현식
        // 문자열에서 특정 패턴을 찾거나 검증 및 추출하는데 사용하는 객체 
        // 슬래시(/pattern/)로 감싸서 생성.
        s2 =  str.replace(/가/g , '나')
        console.log(s2)

        // slice 
        // 시작부터 끝 바로 앞까지 복사 
        console.log(str.slice(3, 6))

        // split 
        // 구분자로 배열을 돌려준다
        console.log( str.split('   ') )

        // substring
        let s = str.substring(3, 6)
        console.log(str)
        console.log(s)

        // substr
        // 시작 index부터 몇 개
        s = str.substr(3, 7)
        console.log(s)

        // trim
        let str2 = "  1 2   3   "
        s = str2.trim()
        console.log(s)

        str2 = "       "
        if(str2.length !=0) {}
        if(str2.trim().length !=0) {}

        // 문제1
        // 어떤 이메일에서 id만 출력하기
        
        let email = 'todair@naver.com'
        user_id = email.indexOf('@')
        console.log('id :' + email.slice(0, user_id))

        // 문제2
        // 주민번호로 성별 출력하기
        
        let id_number = 'YYMMDD-1234567'

        // 입력받은 주민번호를 하이픈('-')을 기준으로 쪼개서 배열로 만듦
        let parts = id_number.split('-') 

        // 뒷자리 덩어리(parts[1]에서 맨 첫 번째 글자(인덱스 0)만 쏙 뽑아옴)
        let genderDigit = parts[1][0]
        // 확인용 출력 : 제대로 숫자가 뽑혔는지 콘솔에서 확인 
        console.log('gender :' + genderDigit)

        // 뽑아낸 성별 숫자가 '1' 또는 '3'인지 검사 
        // 주의 : 문자열에서 뽑아냈기 때문에 반드시 따옴표('')를 붙여서 문자로 비교해야 함
        if (genderDigit === '1' || genderDigit === '3') {
            console.log('성별 : 남')
        } 
        
        // 뽑아낸 성별 숫자가 '2' 또는 '4'인지 검사
        else if (genderDigit === '2' || genderDigit === '4') {
            console.log('성별 : 여')
        }

        // 문제 3
        // '2026-07-14 12:43:19'
        // 월, 분 구하기

        // 날짜 변수 
        let date = '2026-07-14'

        // 시간 변수 
        let time = '12:43:19'

        // 날짜를 3개의 배열로 쪼개기 
        let date_parts = date.split('-')
        console.log(date_parts) // 잘 쪼개졌는지 확인 

        // 3개의 배열 중에 2번째 배열 뽑아오기 
        let date_digit = date_parts[1]
        console.log(date_digit) // 잘 뽑았는지 확인

        // 월 구하기 
        console.log(date_digit , '월')

        // 시간을 3개의 배열로 쪼개기 
        let time_parts = time.split(':')
        console.log(time_parts) // 잘 뽑았는지 확인 

        let time_digit = time_parts[1]
        console.log(time_digit) // 잘 뽑았는지 확인
        
        console.log(time_digit , '분')
        
        // ---------------------------
        // 보안상 당첨 이메일을 가려서 출력
        // todair@naver.com >>>> to****@naver.com
        // 문제 4
        // 앞 두글자만 제대로 표시하고 *표 4개 표시하고 @부터 다 
        // 문제 5
        // 앞 두글자만 제대로 표시하고 *표는 가려진 개수만큼
        // 예: study.todair@gmail.com >> st**********@gmail.com
        email = 'study.todair@gmail.com'
        let id = ' '
        let pos = email.indexOf('@')
        if (pos != -1) {
            id = email.slice(0, pos)
        }
        let mask_id_1 = id.slice(0, 2)
        let len = id.length - 2
        let mask_id_2 = ' '
        for (let i=0; i<len; i++){
            mask_id_2 += '*'
        }
        console.log(mask_id_1 + mask_id_2 + email.substring(pos))


    </script>
</head>
<body>

</body>
</html>
