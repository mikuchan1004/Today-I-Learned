<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pyramid</title>
    <script>
        // 1단계 
        // +++++ 
        let string  = ' '
        for(let i = 1; i <=5; i++) {
            string = string + '+'
        }
        console.log(string)

        // 2단계 
        // +_+_+_+_+_
        let m = '+'
        let s = '_'
        string = ' '
        for(let i = 1; i <=5; i++) {
            string += m
            string += s
        }
        console.log(string)

        // 3단계
        for(let j = 1; j <= 5; j++) {
            string = ' '
            for(let i = 1; i <= 5; i++) {
                string = string + m
            }
            console.log(string)
        }

        // 4단계
        string = ' '
        for(let j =1; j<=5; j++) {
            string = ' '
            for(let i = 1; i <=5; i++) {
                string = string + j
            }
            console.log(string)
        }

        // 5단계
        /*
            1
            22
            333
            4444
            55555
        */
        string = ' '
        for(let j =1; j<=5; j++) {
            string = ' '
            for(let i = 1; i <=j; i++) {
                string = string + j  
            } 
            console.log(string) 
        }
        
        // 6단계
        /*
            +
            ++
            +++
            ++++
            +++++
        */
        string = ' '
        for(let j =1; j<=5; j++) {
            string = ' '
            for(let i = 1; i <=j; i++) {
                string = string + m 
            } 
            console.log(string) 
        }

        // 7단계
        /*
            11111
            2222
            333
            44
            5
        */
        string = ' '
        for(let j =1; j<=5; j++) {
            string = ' '
            for(let i = j; i <= 5; i++) {
                string = string + j  
            } 
            console.log(string) 
        }

        // 8단계
        /*
            +____
            ++___
            +++__
            ++++_
            +++++
        */
        string = ' '
        for(let j =1; j<=5; j++) {
            string = ' '
            for(let i = 1; i <=j; i++) {
                string = string + m 
            }
            for(let i = 1; i <= 5 -j; i++)  {
                string = string + s
            }
            console.log(string) 
        }

        // 9단계
        /*
            ____+
            ___++
            __+++
            _++++
            +++++
        */
        string = ' '
        for(let j =1; j<=5; j++) {
            string = ' '
            for(let i = 1; i <= 5 - j; i++) {
                string = string + s 
            }
            for(let i = 1; i <= j; i++)  {
                string = string + m
            }
            console.log(string) 
        }

        // 10단계
        /*
            ____+
            ___+++
            __+++++
            _+++++++
            +++++++++
        */
        string = ' '
        for(let j =1; j<=5; j++) {
            string = ' '
            for(let i = 1; i <= 5 - j; i++) {
                string = string + s 
            }
            for(let i = 1; i <= j; i++)  {
                string = string + m
            }
            for(let i = 1; i <= j -1; i++) {
                string = string + m
            }
            console.log(string) 
        }

        // 11단계
        /*
            ____+____
            ___+++___
            __+++++__
            _+++++++_
            +++++++++
        */
        string = ' '
        for(let j =1; j<=5; j++) {
            string = ' '
            for(let i = 1; i <= 5 - j; i++) {
                string = string + s 
            }
            for(let i = 1;  i <= (j * 2) - 1; i++) {
                string = string + m
            }
            for(let i = 1; i <= 5 - j; i++) {
                string = string + s
            }
            
            console.log(string) 
        }

        // 12단계
        // 입력 받은 줄 수 대로 출력
        
        let linecount = parseInt(prompt('몇 줄짜리 피라미드를 만들까요?'))
        m = '+' // 피라미드 기호
        s = '_' // 빈칸 기호 
        string = ' ' // 문자열 초기화

        // 1. 전체 높이를 제어하는 바깥쪽 반복문
        // 사용자가 입력한 linecount 만큼 줄을 반복.
        for(let j =1; j<=linecount; j++) {
            string = ' ' // 새로운 줄을 그리기 전에 문자열을 초기화 

            // 2. 왼쪽 빈칸(_)을 출력하는 반복문
            // 줄이 내려갈수록(j가 커질 수록) 빈칸은 줄어듦 (전체 줄 수 - 현재 줄)
            for(let i = 1; i <= linecount - j; i++) {
                string = string + s 
            }
            // 3. 가운데 기호(+) : 등차수열의 일반항 공식을 활용 
            // 등차수열 : 1, 3, 5, 7... (첫째항 1 , 공차 2)
            // 일반항 공식: a_n = a_1 + (n -1 )d 
            //                  = 1 + (j - 1) * 2 = 2j - 1
            // j번째 줄의 기호 개수를 구하기 위해 이 공식을 반복 횟수로 사용 
            for(let i = 1;  i <= (j * 2) - 1; i++) {
                string = string + m
            }
            // 4. 오른쪽 빈칸(_)을 출력하는 반복문 
            // 왼쪽과 대칭이 되어야 하므로 똑같이 (전체 줄 수 - 현재 줄)만큼 반복 
            for(let i = 1; i <= linecount - j; i++) {
                string = string + s
            }
            // 5. 완성된  한 줄을 화면에 출력.
            console.log(string) 
        }
        
        

    </script>
</head>
<body>
    
</body>
</html>
