<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dom</title>
    <style>
        #view {
            color: red;
        }
        #view.pizza {
            font-size: 32px;
        }
    </style>
     
</head>
<body>
    <h1 id="title">DOM 연습</h1>

    <div id="view">첫번째 view</div>
    <div id="view" class="pizza">두번째 view</div>

    <ul id="메뉴">
        <li class="menu li1">치킨</li>
        <li class="menu pizza">피자</li>
        <li class="menu">똠양꿍</li>
        <li>집밥</li>
    </ul>

    <img alt="" src="">

    <script>
        // DOM : Document Object Model
        // javascript로 수정이 가능한 대상

        console.log(document)
        
        // id 속성으로 DOM을 가져오기
        const title = document.getElementById('title')
        console.log(title)
        console.log('' + title)

        // 없으면 null
        const title2 = document.getElementById('title2')
        console.log(title2)

        // 동일한 id가 여러개 있어도
        // 첫번째 DOM만 가져온다
        const view = document.getElementById('view')
        console.log(view)

        // tag로 찾기 
        let divs = document.getElementsByTagName('div')
        console.log(divs)

        // 없으면 length가 0인 배열
        let divs2 = document.getElementsByTagName('div2')
        console.log(divs2)

        if (divs2) {
            console.log(('참'))
        }

        // class로 찾기 
        let menus = document.getElementsByClassName('menu')
        console.log(menus)
        
        // #메뉴 가져오기 
        let 메뉴 = document.getElementById('메뉴')

        // 특정 DOM 안에서도 찾을 수 있다 
        let pizza = 메뉴.getElementsByClassName('pizza')
        console.log(pizza)

        // querySelector
        // CSS 선택자를 사용할 수 있다.
        // 하나의 DOM만 돌려준다
        // 여러개인  경우 첫번째 DOM만 돌려준다 
        // 없는 경우 null을 반환한다

        let view2 = document.querySelector('#view.pizza ')
        console.log(view2)

        let view1 = document.querySelector('#view')
        console.log(view1)

        let view4 = document.querySelector('div#view4')
        console.log(view4)
        // let pizza = menus.getElementsByClassName('pizza')
        // console.log(pizza)

        let qsa = document.querySelectorAll('#view')
        console.log(qsa)

        // 속성 가지고 오는 방법
    </script>


 
</body>
</html>
