<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gemini</title>
    <script>

        const list = {
            contents:[]
        }
        window.onload = function() {
            gemini()
        }
        // API 키를 여기에 하드코딩하면 나쁜 사람들이 사용할 수 있기 때문에, API 키를 입력받게끔 코드를 수정.
        const userAPIKey = prompt('발급받은 제미나이 API키를 입력해주세요')
        
        function gemini() {
            const ask = document.querySelector('#ask')
            ask.addEventListener('click' , function(){
                const key = userAPIKey
                const prompt = document.querySelector('#prompt').value
                const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-3.6-flash:generateContent'

                const data = {
                    contents : [{
                        parts:[{
                            text: prompt
                        }]
                    }]
                }

                fetch(url, {
                    method:'POST',
                    headers: {
                        'x-goog-api-key' : key,
                        'Content-Type' : 'application/json'
                    },
                    body: JSON.stringify(data)
                }).then(function(response) {
                    return response.json()
                }).then(function(result) {
                    console.log(result)
                    console.log(JSON.stringify(result))
                    const modelAnswer = result.candidates[0].content.parts[0].text
                    console.log(modelAnswer)
                    document.querySelector('#answer').innerText = modelAnswer
                }).catch(function(error) {
                    console.error(error)
                })
            })

            const ask2 = document.querySelector('#ask2')
            ask2.addEventListener('click' , function(){
                const key = 'AQ.Ab8RN6KQtg1komsKCRYabdWH8FObDgqInUWxzwxdXTpwBxChWQ'
                const prompt = document.querySelector('#prompt').value
                const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-3.6-flash:generateContent'

                list.contents.push({
                    'role' : 'user',
                    parts: [{
                        text: prompt
                    }]
                })

                fetch(url, {
                    method:'POST',
                    headers: {
                        'x-goog-api-key' : key,
                        'Content-Type' : 'application/json'
                    },
                    body: JSON.stringify(list)
                }).then(function(response) {
                    return response.json()
                }).then(function(result) {
                    console.log(result)

                    list.contents.push({
                        'role' : 'model',
                        parts: [{
                            text: JSON.stringify(result)
                        }]
                    })

                }).catch(function(error) {
                    console.error(error)
                })
            })
        }
    </script>
</head>
<body>
    <textarea id="prompt"></textarea>
    <br>
    <button type="button" id="ask">질문하기</button>
    <button type="button" id="ask2">멀티턴</button>
    <br>
    <div id="answer"></div>
</body>
</html>
