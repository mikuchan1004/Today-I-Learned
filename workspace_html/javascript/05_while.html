        // ATM 만들기
        // 메뉴 : '1: 입금, 2. 출금, 3. 잔액보기, 4. 종료'

        let menu = prompt('1. 입금, 2. 출금, 3. 잔액보기, 4. 종료')
        let money = 0;
        while(menu != 4) {
            if(menu == 1) {
                let user = parseInt(prompt('입금을 원하는 잔액을 입력해주세요'));

                if (user <= 0) { // 0원 이하 방어
                    confirm('0원 이하의 금액은 입금되지 않습니다. 다시 시도해주세요');
                } else {
                    money += user; 
                    confirm(`${user}원이 입금되었습니다`);
                }

            } else if(menu == 2) {
                let user = parseInt(prompt('출금을 원하는 잔액을 입력해주세요'));

                if (user <= 0) { 
                    confirm(' 0원 이하의 금액은 출금할 수 없습니다.');
                } else if (money < user) {
                    confirm('잔액이 부족합니다')
                } else {
                    money -= user;
                    confirm(`${user}원이 출금 되었습니다.`);
                }

            } else if (menu == 3) {
                confirm(`현재 잔액은 ${money}원 입니다.`);
            } 

            menu = prompt('1. 입금, 2. 출금, 3. 잔액보기, 4. 종료');
        }

        // 주사위를 던져서 3이 나올 때까지 반복하고 몇번안에 나왔는가를 출력하기

        let count = 0;

        while (true) {
            count++
            let rand = parseInt(Math.random()*6) + 1;
            console.log(count + '번째 주사위' + rand);

            if (rand === 3) {
                console.log('총' + count + '번 만에 3이 나왔습니다');
                break;
            }
        }

    let  string  = '' // 문자열 초기화

    // 3단계 : 정사각형의 맨 위 테두리 그리기 

    for(let i = 1; i <= border_count; i++) {
        string = string + m
    }
    console.log(string)

    // 4단계 : 정사각형의 중간 테두리 그리기 

    for(let i = 1; i <= border_count -2; i++) {
        let middle_string = ''
        middle_string = middle_string + m; 

        for (let j = 1; j <= border_count - 2; j++) {
            middle_string = middle_string + s;
        }

        middle_string = middle_string + m;
        console.log(middle_string);

    }
