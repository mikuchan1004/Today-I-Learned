<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식당소개</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
        }

        /* ------------------------------------------------
           [섹션 1] 상단 배너 영역
        --------------------------------------------------- */
        .background {
            background-image : url('https://images03.nicepage.com/a1389d7bc73adea1e1c1fb7e/9b22e6f1444b5ae785f3a267/pexelsphoto3326103.jpeg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            width: 100%;
            height: 720px;

            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: flex-start;
            padding-left: 4%;          
            padding-bottom: 60px;      
            box-sizing: border-box;
            position: relative;
        }
        
        .search-box {
            background-color: transparent;
            width: 340px;
            height: 44px;
            font-size: 15px;
            padding: 0 15px;
            border: 2px solid white;
            color: white;
            outline: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);

            position: absolute;
            top: 25px;
            left: 25px;
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .background h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 700;
            line-height: 1.4;
            margin: 0;
        }

        .background h1 span {
            display: inline-block;
            padding: 6px 14px;
            color: #000000;
        }

        .background h1 .bg-white {
            background-color: #ffffff;
            margin-bottom: 4px;
        }

        .background h1 .bg-yellow {
            background-color: #f2c029;
        }

        /* ------------------------------------------------
           [섹션 2] Cafe Food Menu 영역 (노란 배경 수정본)
        --------------------------------------------------- */
        .menu-section {
            width: 100%;
            padding: 120px 0; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .menu-container {
            display: flex;
            flex-direction: row; 
            align-items: center;
            justify-content: space-between;
            max-width: 1050px; /* 노란 박스가 커진 만큼 전체 영역 조절 */
            width: 100%;
            padding: 0 4%;
            box-sizing: border-box;
        }

        /* [왼쪽] 두꺼운 검은색 테두리 글 상자 */
        .menu-text-box {
            border: 4px solid #000000;
            padding: 50px 40px;
            width: 360px;
            box-sizing: border-box;
            background-color: #ffffff;
        }

        .menu-text-box h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 20px;
            color: #000000;
        }

        .menu-text-box p {
            font-family: sans-serif;
            font-size: 14px;
            line-height: 1.6;
            margin: 0;
            color: #000000;
        }

        /* [오른쪽] 절대 좌표 컴포넌트들을 통제할 기준 박스 */
        .menu-visual-box {
            position: relative;
            width: 480px;  
            height: 520px; 
        }

        /* 🛠️ 수정: 크기를 더 키우고, 중앙 정렬에 맞춰 범위를 넓힌 노란색 배경 */
        .yellow-backdrop {
            position: absolute;
            top: -40px;         /* 위로 더 크게 확장 */
            right: 0;           
            width: 380px;       /* 가로 크기 확장하여 정중앙 쪽으로 밀어 넣음 */
            height: 580px;      /* 세로 높이도 아래로 든든하게 확장 */
            background-color: #f2c029;
            z-index: 1;         
        }

        /* 🔒 철저하게 고정: 이미지는 크기나 위치 절대 변경 없음 */
        .menu-image {
            position: absolute;
            top: 10px;          
            left: 0;            
            width: 340px;
            height: 480px;
            object-fit: cover;
            z-index: 2;         
        }
    </style>
</head>
<body>

    <div class="background">
        <input type="text" class="search-box" placeholder="Search">
        <h1>
            <span class="bg-white">YOUR FAVORITE FOOD</span><br>
            <span class="bg-yellow">MAKE IT GOOD</span>
        </h1>
    </div>

    <div class="menu-section">
        <div class="menu-container">
            
            <div class="menu-text-box">
                <h2>Cafe Food Menu</h2>
                <p>All of our food is prepared by our team of trained kitchen staff from the sealed glass kitchen where you can see your food being made, without risk of little paws getting involved.</p>
            </div>
            
            <div class="menu-visual-box">
                <div class="yellow-backdrop"></div>
                <img class="menu-image" src="https://images03.nicepage.com/a1389d7bc73adea1e1c1fb7e/9b22e6f1444b5ae785f3a267/pexelsphoto3326103.jpeg" alt="Menu Image">
            </div>

        </div>
    </div>

</body>
</html>
