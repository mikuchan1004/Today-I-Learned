<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식당소개</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
        }

        /* ------------------------------------------------
           [섹션 1] 상단 배너 영역
        --------------------------------------------------- */
        .background {
            background-image : url('https://images03.nicepage.com/a1389d7bc73adea1e1c1fb7e/9b22e6f1444b5ae785f3a267/pexelsphoto3326103.jpeg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            width: 100%;
            height: 720px;

            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: flex-start;
            padding-left: 4%;          
            padding-bottom: 60px;      
            box-sizing: border-box;
            position: relative;
        }
        
        .search-box {
            background-color: transparent;
            width: 340px;
            height: 44px;
            font-size: 15px;
            padding: 0 15px;
            border: 2px solid white;
            color: white;
            outline: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);

            position: absolute;
            top: 25px;
            left: 25px;
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .background h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 700;
            line-height: 1.4;
            margin: 0;
        }

        .background h1 span {
            display: inline-block;
            padding: 6px 14px;
            color: #000000;
        }

        .background h1 .bg-white {
            background-color: #ffffff;
            margin-bottom: 4px;
        }

        .background h1 .bg-yellow {
            background-color: #f2c029;
        }

        /* ------------------------------------------------
           [섹션 2] Cafe Food Menu 영역 (정밀 좌표 수정본)
        --------------------------------------------------- */
        .menu-section {
            width: 100%;
            padding: 120px 0; /* 위아래 여백을 주어 배너와 확실히 분리 */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .menu-container {
            display: flex;
            flex-direction: row; 
            align-items: center;
            justify-content: space-between;
            max-width: 1000px;
            width: 100%;
            padding: 0 4%;
            box-sizing: border-box;
        }

        /* [왼쪽] 두꺼운 검은색 테두리 글 상자 */
        .menu-text-box {
            border: 4px solid #000000;
            padding: 50px 40px;
            width: 360px;
            box-sizing: border-box;
            background-color: #ffffff;
        }

        .menu-text-box h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 20px;
            color: #000000;
        }

        .menu-text-box p {
            font-family: sans-serif;
            font-size: 14px;
            line-height: 1.6;
            margin: 0;
            color: #000000;
        }

        /* [오른쪽] 절대 좌표(absolute) 컴포넌트들을 통제할 기준 박스 */
        .menu-visual-box {
            position: relative;
            width: 440px;
            height: 500px; /* 내부 요소들이 놀 수 있는 명확한 높이 지정 */
        }

        /* 맨 뒤에 배치되는 노란색 백드롭 (정밀 좌표 지정) */
        .yellow-backdrop {
            position: absolute;
            top: -20px;         /* 사진보다 30px 위로 삐져나옴 */
            right: 0;           /* 우측 벽에 밀착 */
            width: 320px;
            height: 540px;      /* 사진보다 30px 아래로 더 내려감 */
            background-color: #f2c029;
            z-index: 1;         
        }

        /* 노란색 위에 정교하게 얹어지는 실제 타르트 음식 사진 */
        .menu-image {
            position: absolute;
            top: 10px;          /* 노란 박스보다 약간 아래에서 시작 */
            left: 0;            /* 노란 박스보다 왼쪽으로 삐져나옴 */
            width: 340px;
            height: 480px;
            object-fit: cover;
            z-index: 2;         /* 노란색보다 위로 레이어 쌓기 */
        }
    </style>
</head>
<body>

    <div class="background">
        <input type="text" class="search-box" placeholder="Search">
        <h1>
            <span class="bg-white">YOUR FAVORITE FOOD</span><br>
            <span class="bg-yellow">MAKE IT GOOD</span>
        </h1>
    </div>

    <div class="menu-section">
        <div class="menu-container">
            
            <div class="menu-text-box">
                <h2>Cafe Food Menu</h2>
                <p>All of our food is prepared by our team of trained kitchen staff from the sealed glass kitchen where you can see your food being made, without risk of little paws getting involved.</p>
            </div>
            
            <div class="menu-visual-box">
                <div class="yellow-backdrop"></div>
                <img class="menu-image" src="https://images03.nicepage.com/c461c07a441a5d220e8feb1a/e07fd7349a87546e950fb324/photo1564305564045c62d40dd0123.jpg" alt="Menu Tart Image">
            </div>

        </div>
    </div>

</body>
</html>
