<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식당소개</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        .background {
            border: 1px solid red;
            background-image : url('https://images03.nicepage.com/a1389d7bc73adea1e1c1fb7e/9b22e6f1444b5ae785f3a267/pexelsphoto3326103.jpeg');
           
            background-repeat: no-repeat;

            background-position: center;

            background-size: cover;

            width: 100%;
            
            height: 720px;

            display: flex;

            flex-direction: column;

            justify-content: flex-end;
            
            align-items: flex-start;

            padding-left: 4%;

            padding-bottom: 60px;

            box-sizing: border-box;
            
            position: relative;
         }
        .search-box {
            background-color: transparent;

            width: 340px;
            height: 44px;
            font-size: 15px;
            padding: 0 15px;

            border: 2px solid white;
            color: white;
            
            outline: none;

            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);

            position: absolute;
            top: 0;
            left: 0;
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.6);

        }

        .background h1 {
            font-family: 'Montserrat', sans-serif;
            color: white;
            font-size: 32px; 
            font-weight: 700;
            line-height: 1.4;
            margin: 0;
        }

        .background h1 span {
            display: inline-block;
            padding: 6px 14px;
            color: #000000;
        }

        .background h1 .bg-white {
            background-color: #ffffff;
            margin-bottom: 4px;
        }

        .background h1 .bg-yellow {
            background-color: #f2c029;
        }

        .menu-seciton {
            background-color: #ffffff;
            width: 100%;
            padding: 100px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .menu-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1000px;
            width: 100%;
            padding: 0 5%;
            box-sizing: border-box;
        }

        .menu-text-box {
            border:  4px solid #000000;
            padding: 50px 40px; 
            width: 360px;
            box-sizing: border-box;
            background-color:  #ffffff;
        }

        .menu-text-box h2 {
            font-family: 'Montserrat' , sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 20px;
            color: #000000;
        }

        .menu-text-box p {
            font-family: sans-serif;
            font-size: 14px;
            line-height: 1.6;
            margin: 0;
            color: #000000;
        }

        .menu-visual-box {
            position: relative;
            width: 400px;
            height: 480px;
        }

        .yellow-backdrop {
            position: absolute;
            top: -30px;
            right: -40px;
            width: 300px;
            height: 540px;
            background-color: #f2c029;
            z-index: 1;
        }

        .menu-image {
            position: relative;
            width: 350px;
            height: 480px;
            object-fit: cover;
            z-index: 2;
            display: block;
        }

    </style>
</head>
<body>
    <div class="background">
        <input type="text" class="search-box" placeholder="Search">
        <h1>
            <span class="bg-white">YOUR FAVORITE FOOD</span><br>
            <span class="bg-yellow">MAKE IT GOOD</span>
        </h1>
    </div> <div class="menu-section">
        <div class="menu-container">
            
            <div class="menu-text-box">
                <h2>Cafe Food Menu</h2>
                <p>All of our food is prepared by our team of trained kitchen staff from the sealed glass kitchen where you can see your food being made, without risk of little paws getting involved.</p>
            </div>
            
            <div class="menu-visual-box">
                <div class="yellow-backdrop"></div>
                <img class="menu-image" src="https://images03.nicepage.com/a1389d7bc73adea1e1c1fb7e/9b22e6f1444b5ae785f3a267/pexelsphoto3326103.jpeg" alt="Menu Image">
            </div>

        </div>
    </div>
</body>
</html>
