<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>main</title>
    <style>

         body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .board-container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
        }

       /*  테이블 전체 스타일 */
        .cafe-table {
            width: 100%;
            border-collapse: collapse; /* 선을 하나로 합침 */
            border-top: 2px solid #555; /* 맨 위 굵은 선 */
            font-size: 14px;
            color: #333;
        }

        /* 헤더 스타일 */
        .cafe-table thead th {
            padding: 12px 0;
            border-bottom: 1px solid #ddd;
            font-weight: bold; 
            color: #666;
        }

        /* 내용 스타일 */
        .cafe-table tbody td {
            padding: 12px 5px;
            border-bottom: 1px solid #eee;
            text-align: center; /* 기본은 가운데 정렬 */
        }

        .cafe-table tbody th:nth-child(1) { width: 5%;}
        .cafe-table tbody th:nth-child(2) { width: 50%;}
        .cafe-table tbody th:nth-child(3) { width: 15%;}
        .cafe-table tbody th:nth-child(4) { width: 10%;}
        .cafe-table tbody th:nth-child(5) { width: 10%;}
        .cafe-table tbody th:nth-child(6) { width: 10%;}


        /* '제목' 칸만 왼쪽 정렬 */
        .cafe-table tbody td:nth-child(2) {
            text-align: left;
        }

        .cafe-table tbody td:nth-child(3) {
            text-align: left;
        }

        /* 마우스 올렸을 때 효과 */
        .cafe-table tbody tr:hover {
            background-color: #f5f5f5;
        }

        .board-title {
            display: inline-block;
            font-size: 24px;
            font-weight: 700;
            color: #333;
            padding-bottom: 10px;
            margin-bottom: 25px;
            /* border-bottom: 2px solid #333; */
        }

        .page-nav {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #555;
        }

        .page-nav span {
            padding: 5px 8px;
            margin: 0 2px;
            cursor: pointer;
            border: 1px solid #ddd;
        }

        .page-nav span.active {
            font-weight: bold;
            border: 1px solid #333;
            color: #888;
        }

        .page-nav .btn {
            color: #888;
        }
    </style>
</head>
